name: planitt

services:
  ollama:
    image: ollama/ollama:latest
    container_name: planitt-ollama
    volumes:
      - planitt_ollama_data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: planitt-mongodb
    volumes:
      - planitt_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: planitt
    expose:
      - "27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10

  planitt-backend:
    build:
      context: ./planitt-backend
    container_name: planitt-backend
    environment:
      PORT: "3000"
      MONGODB_URI: "${PLANITT_MONGODB_URI:-mongodb+srv://planittcrypto_db_user:XD0ITbU8bHCdhaE1@planitt.5hxwdty.mongodb.net/}"
      JWT_SECRET: "${PLANITT_JWT_SECRET:-37E749APqWO0WQELyFsYNu/DP4YFGUPzAAyTKue+rGU=}"
      PLANITT_INTERNAL_API_KEY: "${PLANITT_INTERNAL_API_KEY:-plnt_itn_ff661f02d517eb8a3f44b3795184acf286db51053e0315ca0286baa649a95f46}"
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "3000:3000"

  signal-processing:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: planitt-signal-processing
    environment:
      ENV: "development"

      # Run Planitt mode without legacy Postgres initialization.
      ENABLE_POSTGRES_DB_INIT: "false"

      # LLM (local-only via Ollama)
      LLM_PROVIDER: "ollama"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "mistral"

      # FastAPI internal API key (protects /api/v1/signals/*)
      PLANITT_PROCESSOR_INTERNAL_API_KEY: "plnt_prc_895132c65434571815668a098125436789012345678901234567890123456789"

      # Forwarding to NestJS backend
      PLANITT_BACKEND_BASE_URL: "http://planitt-backend:3000"
      PLANITT_BACKEND_INTERNAL_API_KEY: "plnt_itn_ff661f02d517eb8a3f44b3795184acf286db51053e0315ca0286baa649a95f46"

      # Recommended signals threshold
      PLANITT_MIN_CONFIDENCE: "70"
      PLANITT_SCAN_TIMEFRAMES: "${PLANITT_SCAN_TIMEFRAMES:-5m,15m,1h}"
      PLANITT_MIN_CONFLUENCE_HITS: "${PLANITT_MIN_CONFLUENCE_HITS:-2}"
      PLANITT_VOLUME_MULTIPLIER: "${PLANITT_VOLUME_MULTIPLIER:-1.2}"
      PLANITT_TOUCH_TOLERANCE_PCT: "${PLANITT_TOUCH_TOLERANCE_PCT:-0.01}"

      # Binance (public endpoints are used; keys are optional for klines)
      BINANCE_TESTNET: "true"
    depends_on:
      ollama:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  planitt_ollama_data:
  planitt_mongo_data:

networks:
  default:
    name: planitt-network

